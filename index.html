  <title>H.R Links</title>  <style>
    :root {
      --bg: #0f2027;
      --card: #1e2a32;
      --text: #ffffff;
      --accent: #00c6ff;
    }

    body.light {
      --bg: #f4f4f4;
      --card: #ffffff;
      --text: #222;
      --accent: #0077ff;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.4s;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--accent);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      margin: 10px 0;
    }

    .links a {
      display: block;
      background: var(--card);
      margin: 10px 0;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 18px;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .links a::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: -100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.5s;
    }

    .links a:hover::before {
      left: 100%;
    }

    .links a:hover {
      transform: scale(1.05);
    }

    .toggle {
      margin: 15px;
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: bold;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }

  </style></head>
