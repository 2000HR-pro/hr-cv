<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H.R Links</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --bg: #0f2027;
      --card: #1e2a32;
      --text: #ffffff;
      --accent: #00c6ff;
    }

    body.light {
      --bg: #f4f4f4;
      --card: #ffffff;
      --text: #222;
      --accent: #0077ff;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.4s;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--accent);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 { margin: 10px 0; }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px; 
      background: var(--card);
      margin: 12px 0;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 18px;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
      font-weight: 500;
    }

    .fa-whatsapp { color: #25D366; }
    .fa-facebook { color: #1877F2; }
    .fa-instagram { color: #E4405F; }
    .fa-snapchat { color: #FFFC00; text-shadow: 0 0 2px black; }
    .fa-tiktok { color: #000000; } 
    body.light .fa-tiktok { color: #000; }
    .fa-telegram { color: #0088cc; }
    .fa-youtube { color: #FF0000; }
    .fa-envelope { color: #EA4335; }
    .fa-linkedin { color: #0077B5; }
    .fa-x-twitter { color: #000000; }
    body.light .fa-x-twitter { color: #000; }

    .links a:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .toggle {
      margin: 15px;
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: bold;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="container">

      <i class="fab fa-whatsapp"></i> WhatsApp
    </a>
    <a href="https://facebook.com/hassan.ragab.75033" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-facebook"></i> Facebook
    </a>
    <a href="https://instagram.com/hassona3.5" target="_blank" rel="noopener noreferrer">
      <i class="fab fa-instagram"></i> Instagram

    <a href="https://www.snapchat.com/add/hassanragab8213" target="_blank" rel="noopener noreferrer">

    <a href="https://www.tikTok.com/@hassona.26.2" target="_blank" rel="noopener noreferrer">
